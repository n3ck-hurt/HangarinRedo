{% extends "base_auth.html" %}

{% block title %}Sign up — Hangarin Arms{% endblock %}

{% block auth_content %}
<div class="auth-card">
	<div class="auth-card-header">Create your Hangarin Arms account</div>
	<div class="auth-card-body">
		<form method="post" action="{% url 'account_signup' %}">
			{% csrf_token %}
			{% include 'includes/form.html' %}
			{% if redirect_field_value %}
			<input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
			{% endif %}
			<button type="submit" class="btn btn-primary btn-block btn-login mt-2">Sign up</button>
		</form>
	</div>
	<div class="auth-footer">
		<p class="mb-0">Already have an account? <a href="{% url 'account_login' %}">Sign in</a></p>
	</div>
</div>
{% endblock %}
