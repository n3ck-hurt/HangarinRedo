{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>

	<meta charset="utf-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	{% include 'includes/pwa_head.html' %}

	<title>{% block title %}Hangarin Arms{% endblock %}</title>

	<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:400,600,700">

	<style>

		body {

			font-family: 'Nunito', sans-serif;

			background: #0a0a0a;

			min-height: 100vh;

			display: flex;

			align-items: center;

			justify-content: center;

			margin: 0;

			padding: 24px;

			color: #fff;

		}

		.auth-card {

			width: 100%;

			max-width: 420px;

			background: #1e1e1e;

			border-radius: 4px;

			box-shadow: 0 4px 24px rgba(196, 30, 58, 0.25);

			border: 1px solid #2a2a2a;

			overflow: hidden;

		}

		.auth-card-header {

			background: #c41e3a;

			color: #fff;

			padding: 16px 20px;

			font-size: 1.1rem;

			font-weight: 600;

		}

		.auth-card-body {

			padding: 24px 20px 20px;

			color: #fff;

		}

		.auth-card-body label {

			font-weight: 600;

			font-size: 0.9rem;

			color: #fff;

		}

		.auth-footer {

			padding: 0 20px 20px;

			text-align: center;

			font-size: 0.9rem;

			color: #b8b8b8;

		}

		.auth-footer a {

			color: #e82545;

		}

		.btn-login {

			background: #c41e3a;

			border-color: #c41e3a;

			font-weight: 600;

			color: #fff;

		}

		.btn-login:hover {

			background: #e82545;

			border-color: #e82545;

			color: #fff;

		}

		.btn-google {

			border: 1px solid #444;

			background: #141414;

			color: #fff;

			font-weight: 600;

		}

		.btn-google:hover {

			background: #2a2a2a;

			color: #fff;

		}

		.auth-divider {

			display: flex;

			align-items: center;

			margin: 18px 0;

			color: #888;

			font-size: 0.85rem;

		}

		.auth-divider::before,

		.auth-divider::after {

			content: '';

			flex: 1;

			border-bottom: 1px solid #444;

		}

		.auth-divider span {

			padding: 0 12px;

		}

		.auth-brand {

			text-align: center;

			margin-bottom: 20px;

			font-size: 1.75rem;

			font-weight: 800;

			color: #fff;

			letter-spacing: 0.04em;

		}

		.auth-brand span {

			color: #c41e3a;

		}

		.errorlist {

			color: #ff6b7a;

			padding-left: 18px;

			font-size: 0.85rem;

		}

		.auth-card-body input[type="text"],

		.auth-card-body input[type="email"],

		.auth-card-body input[type="password"] {

			display: block;

			width: 100%;

			padding: 0.375rem 0.75rem;

			font-size: 1rem;

			line-height: 1.5;

			color: #fff;

			background-color: #141414;

			border: 1px solid #444;

			border-radius: 0.25rem;

		}

		.alert-danger {

			background: #3d0a12;

			border-color: #c41e3a;

			color: #fff;

		}

	</style>

</head>

<body>

	<div>

		<div class="auth-brand">Hangarin <span>Arms</span></div>

		{% block auth_content %}{% endblock %}

	</div>

{% include 'includes/pwa_register.html' %}
</body>

</html>
