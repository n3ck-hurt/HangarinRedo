{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="theme-color" content="#c41e3a">
	<title>Offline — Hangarin Arms</title>
	<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
	<link rel="stylesheet" href="{% static 'css/hangarin-theme.css' %}">
	<style>
		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #0a0a0a;
			color: #fff;
			text-align: center;
			padding: 24px;
		}
		h1 { color: #c41e3a; font-weight: 800; }
	</style>
</head>
<body>
	<div>
		<h1>Hangarin Arms</h1>
		<p class="lead">You are offline.</p>
		<p class="text-muted">Reconnect to the internet, then reload the app.</p>
		<button type="button" class="btn btn-primary mt-3" onclick="location.reload()">Try again</button>
	</div>
</body>
</html>
