{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="content">
  <div class="container-fluid">
    <h4 class="page-title">Firearm listing</h4>
    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              {% if object %} Update firearm {% else %} Add new firearm {% endif %}
            </div>
            <div class="card-category">Enter product details for the store catalog</div>
          </div>
          <div class="card-body">
            <div class="col-md-6">
              <form action="" method="post" novalidate>
                {% csrf_token %}
                {% include 'includes/form.html' %}
                <div class="form-group pt-3">
                  <button type="submit" class="btn btn-primary btn-rounded">Save listing</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
